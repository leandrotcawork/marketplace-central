      type: object
      properties:
        id:                 { type: string, format: uuid }
        marketplace_code:   { type: string }
        category_id:        { type: string }
        listing_type:       { type: string }
        commission_percent: { type: number }
        fixed_fee_amount:   { type: number }
        notes:              { type: string }
        source:             { type: string, enum: [api_sync, seeded, manual] }
        synced_at:          { type: string, format: date-time }

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: >
                Module-specific error code following the pattern MODULE_ENTITY_REASON.
                Known codes include: CATALOG_PRODUCT_NOT_FOUND, CATALOG_ENRICHMENT_INVALID,
                CLASSIFICATIONS_ENTITY_NOT_FOUND, CLASSIFICATIONS_DUPLICATE_NAME,
                MARKETPLACES_ACCOUNT_NOT_FOUND, MARKETPLACES_POLICY_NOT_FOUND,
                MARKETPLACES_DUPLICATE_ACCOUNT, MARKETPLACES_DUPLICATE_POLICY,
                PRICING_SIMULATION_INVALID, PRICING_SIMULATION_NOT_FOUND,
                CONNECTORS_BATCH_NOT_FOUND, CONNECTORS_RETRY_MISSING_PRODUCT,
                INTERNAL_ERROR, INVALID_REQUEST, NOT_FOUND, CONFLICT.
            message:
              type: string
            details:
              type: object
              additionalProperties: true

