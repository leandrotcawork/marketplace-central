          type: string
          enum: [oauth2, lwa, api_key, token, unknown]
        is_active:
          type: boolean
        capability_profile:
          $ref: '#/components/schemas/CapabilityProfile'
        metadata:
          $ref: '#/components/schemas/PluginMetadata'

    IntegrationProviderDefinition:
      type: object
      required:
        - provider_code
        - tenant_id
        - family
        - display_name
        - auth_strategy
        - install_mode
        - declared_capabilities
        - is_active
        - created_at
        - updated_at
      properties:
        provider_code:
          type: string
        tenant_id:
          type: string
        family:
          type: string
          enum: [marketplace]
        display_name:
          type: string
        auth_strategy:
          type: string
          enum: [oauth2, api_key, token, none, unknown]
        install_mode:
          type: string
          enum: [interactive, manual, hybrid]
        metadata:
          type: object
          additionalProperties: true
        declared_capabilities:
          type: array
          items:
