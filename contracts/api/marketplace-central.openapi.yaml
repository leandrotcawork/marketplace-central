openapi: 3.1.0
info:
  title: Marketplace Central API
  version: 2026-04-02
paths:
  /catalog/products:
    get:
      summary: List catalog products
      operationId: listCatalogProducts
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCatalogProductsResponse'
  /catalog/products/{id}:
    get:
      summary: Get a single catalog product
      operationId: getCatalogProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/products/search:
    get:
      summary: Search catalog products
      operationId: searchCatalogProducts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCatalogProductsResponse'
  /catalog/products/{id}/enrichment:
    get:
      summary: Get product enrichment data
      operationId: getProductEnrichment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnrichment'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Upsert product enrichment data
      operationId: upsertProductEnrichment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductEnrichment'
      responses:
        "200":
          description: Enrichment upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnrichment'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/taxonomy:
    get:
      summary: List taxonomy nodes
      operationId: listTaxonomyNodes
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTaxonomyNodesResponse'
  /classifications:
    get:
      summary: List classifications
      operationId: listClassifications
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListClassificationsResponse'
    post:
      summary: Create classification
      operationId: createClassification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassificationRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /classifications/{id}:
    get:
      summary: Get classification with product IDs
      operationId: getClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update classification
      operationId: updateClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClassificationRequest'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete classification
      operationId: deleteClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Classification deleted
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/providers:
    get:
      summary: List integration provider definitions
      operationId: listIntegrationProviders
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIntegrationProvidersResponse'
  /integrations/installations:
    get:
      summary: List integration installations
      operationId: listIntegrationInstallations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIntegrationInstallationsResponse'
    post:
      summary: Create integration installation
      operationId: createIntegrationInstallation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationInstallationRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationInstallation'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/installations/{id}/auth/authorize:
    post:
      summary: Start OAuth authorization flow
      operationId: startIntegrationAuthorization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authorization URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        "409":
          description: Invalid installation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/auth/callback:
    get:
      summary: OAuth callback endpoint
      operationId: handleIntegrationAuthCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirects to frontend connection status page
  /integrations/installations/{id}/auth/credentials:
    post:
      summary: Submit API key credentials
      operationId: submitIntegrationCredentials
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAPIKeyRequest'
      responses:
        "200":
          description: Credentials accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
  /integrations/installations/{id}/disconnect:
    post:
      summary: Disconnect integration installation
      operationId: disconnectIntegrationInstallation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Installation disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
  /integrations/installations/{id}/reauth/authorize:
    post:
      summary: Start reauthorization flow
      operationId: startIntegrationReauthorization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reauthorization URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
  /integrations/installations/{id}/auth/status:
    get:
      summary: Read integration auth status
      operationId: getIntegrationAuthStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Installation auth status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatusResponse'
  /integrations/installations/{id}/fee-sync:
    post:
      summary: Start installation fee sync
      operationId: startIntegrationFeeSync
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Fee sync accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationFeeSyncAccepted'
        "400":
          description: Invalid request or unsupported installation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /integrations/installations/{id}/operations:
    get:
      summary: List installation operation runs
      operationId: listIntegrationOperationRuns
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Installation operation runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIntegrationOperationRunsResponse'
  /marketplaces/definitions:
    get:
      operationId: listMarketplaceDefinitions
      summary: List all registered marketplace types
      tags: [marketplaces]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketplaceDefinition'

  /marketplaces/fee-schedules:
    get:
      operationId: listMarketplaceFeeSchedules
      summary: List fee schedules for a marketplace
      tags: [marketplaces]
      parameters:
        - name: marketplace_code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketplaceFeeSchedule'
        "400":
          description: marketplace_code query param missing

  /admin/fee-schedules/seed:
    post:
      operationId: seedMarketplaceFeeSchedules
      summary: Force-seed fee schedules for a marketplace
      tags: [admin]
      parameters:
        - name: marketplace_code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  marketplace_code: { type: string }
                  seeded:           { type: integer }
        "400":
          description: Unknown marketplace_code or missing param
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/fee-schedules/sync:
    post:
      operationId: syncMarketplaceFeeSchedules
      summary: Force-sync fee schedules for a marketplace
      tags: [admin]
      parameters:
        - name: marketplace_code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  marketplace_code: { type: string }
                  synced:           { type: integer }
        "400":
          description: Unknown marketplace_code or missing param
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /marketplaces/accounts:
    get:
      summary: List marketplace accounts
      operationId: listMarketplaceAccounts
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketplaceAccountsResponse'
    post:
      summary: Create marketplace account
      operationId: createMarketplaceAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketplaceAccountRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceAccount'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplaces/policies:
    get:
      summary: List marketplace policies
      operationId: listMarketplacePolicies
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketplacePoliciesResponse'
    post:
      summary: Create marketplace policy
      operationId: createMarketplacePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketplacePolicyRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplacePolicy'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pricing/simulations:
    get:
      summary: List pricing simulations
      operationId: listPricingSimulations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPricingSimulationsResponse'
    post:
      summary: Run pricing simulation
      operationId: createPricingSimulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunPricingSimulationRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingSimulation'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pricing/simulations/batch:
    post:
      summary: Run batch pricing simulation
      operationId: runPricingBatchSimulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunPricingBatchRequest'
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPricingBatchResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "503":
          description: Batch simulation unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /connectors/vtex/validate-connection:
    post:
      summary: Validate VTEX API credentials
      operationId: validateVTEXConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vtex_account
              properties:
                vtex_account:
                  type: string
                  description: VTEX account name
      responses:
        "200":
          description: Connection successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [connected]
                  vtex_account:
                    type: string
        "400":
          description: Missing vtex_account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid VTEX credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: VTEX API unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /connectors/melhor-envio/auth/start:
    get:
      summary: Start Melhor Envio OAuth flow
      operationId: startMelhorEnvioOAuth
      responses:
        "302":
          description: Redirect to Melhor Envio authorization page
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'
        "500":
          description: Failed to create OAuth state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/melhor-envio/auth/callback:
    get:
      summary: Handle Melhor Envio OAuth callback
      operationId: handleMelhorEnvioOAuthCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: OAuth exchange successful
        "400":
          description: Missing code or state mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'
        "500":
          description: Failed to save token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'
        "502":
          description: Token exchange failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/melhor-envio/status:
    get:
      summary: Check Melhor Envio OAuth status
      operationId: getMelhorEnvioOAuthStatus
      responses:
        "200":
          description: OAuth connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'
        "500":
          description: Failed to read token state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/vtex/publish:
    post:
      operationId: publishToVTEX
      summary: Trigger batch publication to VTEX
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishToVTEXRequest'
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishToVTEXResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/vtex/publish/batch/{batch_id}:
    get:
      operationId: getVTEXBatchStatus
      summary: Get batch publication status
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/vtex/publish/batch/{batch_id}/retry:
    post:
      operationId: retryVTEXBatch
      summary: Retry failed operations in a batch
      description: Only failed operations are retried. `supplemental_products` must include data for every failed product (by `product_id`). If any failed product is missing from `supplemental_products`, the entire retry request is rejected with `CONNECTORS_RETRY_MISSING_PRODUCT`.
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryVTEXBatchRequest'
      responses:
        '200':
          description: Retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishToVTEXResponse'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

components:
  schemas:
    CatalogProduct:
      type: object
      properties:
        product_id:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        brand_name:
          type: string
        status:
          type: string
        cost_amount:
          type: number
        price_amount:
          type: number
        stock_quantity:
          type: number
        ean:
          type: string
        reference:
          type: string
        taxonomy_node_id:
          type: string
        taxonomy_name:
          type: string
        suggested_price:
          type: number
          nullable: true
        height_cm:
          type: number
          nullable: true
        width_cm:
          type: number
          nullable: true
        length_cm:
          type: number
          nullable: true
        weight_g:
          type: number
          nullable: true
    TaxonomyNode:
      type: object
      properties:
        node_id:
          type: string
        name:
          type: string
        level:
          type: integer
        level_label:
          type: string
        parent_node_id:
          type: string
        is_active:
          type: boolean
        product_count:
          type: integer
    ProductEnrichment:
      type: object
      properties:
        product_id:
          type: string
        height_cm:
          type: number
          nullable: true
        width_cm:
          type: number
          nullable: true
        length_cm:
          type: number
          nullable: true
        weight_g:
          type: number
          nullable: true
        suggested_price_amount:
          type: number
          nullable: true
    Classification:
      type: object
      properties:
        classification_id:
          type: string
        name:
          type: string
        ai_context:
          type: string
        product_ids:
          type: array
          items:
            type: string
        product_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ClassificationSummary:
      type: object
      properties:
        classification_id:
          type: string
        name:
          type: string
        ai_context:
          type: string
        product_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateClassificationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        ai_context:
          type: string
        product_ids:
          type: array
          items:
            type: string
    UpdateClassificationRequest:
      type: object
      properties:
        name:
