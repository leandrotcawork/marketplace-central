openapi: 3.1.0
info:
  title: Marketplace Central API
  version: 2026-04-02
paths:
  /catalog/products:
    get:
      summary: List catalog products
      operationId: listCatalogProducts
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCatalogProductsResponse'
  /catalog/products/{id}:
    get:
      summary: Get a single catalog product
      operationId: getCatalogProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogProduct'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/products/search:
    get:
      summary: Search catalog products
      operationId: searchCatalogProducts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCatalogProductsResponse'
  /catalog/products/{id}/enrichment:
    get:
      summary: Get product enrichment data
      operationId: getProductEnrichment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnrichment'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Upsert product enrichment data
      operationId: upsertProductEnrichment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductEnrichment'
      responses:
        "200":
          description: Enrichment upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductEnrichment'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog/taxonomy:
    get:
      summary: List taxonomy nodes
      operationId: listTaxonomyNodes
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTaxonomyNodesResponse'
  /classifications:
    get:
      summary: List classifications
      operationId: listClassifications
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListClassificationsResponse'
    post:
      summary: Create classification
      operationId: createClassification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassificationRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /classifications/{id}:
    get:
      summary: Get classification with product IDs
      operationId: getClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update classification
      operationId: updateClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClassificationRequest'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classification'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete classification
      operationId: deleteClassification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Classification deleted
        "404":
          description: Classification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplaces/accounts:
    get:
      summary: List marketplace accounts
      operationId: listMarketplaceAccounts
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketplaceAccountsResponse'
    post:
      summary: Create marketplace account
      operationId: createMarketplaceAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketplaceAccountRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceAccount'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplaces/policies:
    get:
      summary: List marketplace policies
      operationId: listMarketplacePolicies
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMarketplacePoliciesResponse'
    post:
      summary: Create marketplace policy
      operationId: createMarketplacePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketplacePolicyRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplacePolicy'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pricing/simulations:
    get:
      summary: List pricing simulations
      operationId: listPricingSimulations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPricingSimulationsResponse'
    post:
      summary: Run pricing simulation
      operationId: createPricingSimulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunPricingSimulationRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingSimulation'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /connectors/vtex/validate-connection:
    post:
      summary: Validate VTEX API credentials
      operationId: validateVTEXConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vtex_account
              properties:
                vtex_account:
                  type: string
                  description: VTEX account name
      responses:
        "200":
          description: Connection successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [connected]
                  vtex_account:
                    type: string
        "400":
          description: Missing vtex_account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid VTEX credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: VTEX API unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /connectors/vtex/publish:
    post:
      operationId: publishToVTEX
      summary: Trigger batch publication to VTEX
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishToVTEXRequest'
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishToVTEXResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/vtex/publish/batch/{batch_id}:
    get:
      operationId: getVTEXBatchStatus
      summary: Get batch publication status
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

  /connectors/vtex/publish/batch/{batch_id}/retry:
    post:
      operationId: retryVTEXBatch
      summary: Retry failed operations in a batch
      description: Only failed operations are retried. `supplemental_products` must include data for every failed product (by `product_id`). If any failed product is missing from `supplemental_products`, the entire retry request is rejected with `CONNECTORS_RETRY_MISSING_PRODUCT`.
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryVTEXBatchRequest'
      responses:
        '200':
          description: Retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishToVTEXResponse'
        '404':
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorErrorResponse'

components:
  schemas:
    CatalogProduct:
      type: object
      properties:
        product_id:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        brand_name:
          type: string
        status:
          type: string
        cost_amount:
          type: number
        price_amount:
          type: number
        stock_quantity:
          type: number
        ean:
          type: string
        reference:
          type: string
        taxonomy_node_id:
          type: string
        taxonomy_name:
          type: string
        suggested_price:
          type: number
          nullable: true
        height_cm:
          type: number
          nullable: true
        width_cm:
          type: number
          nullable: true
        length_cm:
          type: number
          nullable: true
    TaxonomyNode:
      type: object
      properties:
        node_id:
          type: string
        name:
          type: string
        level:
          type: integer
        level_label:
          type: string
        parent_node_id:
          type: string
        is_active:
          type: boolean
        product_count:
          type: integer
    ProductEnrichment:
      type: object
      properties:
        product_id:
          type: string
        height_cm:
          type: number
          nullable: true
        width_cm:
          type: number
          nullable: true
        length_cm:
          type: number
          nullable: true
        suggested_price_amount:
          type: number
          nullable: true
    Classification:
      type: object
      properties:
        classification_id:
          type: string
        name:
          type: string
        ai_context:
          type: string
        product_ids:
          type: array
          items:
            type: string
        product_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ClassificationSummary:
      type: object
      properties:
        classification_id:
          type: string
        name:
          type: string
        ai_context:
          type: string
        product_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateClassificationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        ai_context:
          type: string
        product_ids:
          type: array
          items:
            type: string
    UpdateClassificationRequest:
      type: object
      properties:
        name:
          type: string
        ai_context:
          type: string
        product_ids:
          type: array
          items:
            type: string
    MarketplaceAccount:
      type: object
      required:
        - account_id
        - tenant_id
        - channel_code
        - display_name
        - status
        - connection_mode
      properties:
        account_id:
          type: string
        tenant_id:
          type: string
        channel_code:
          type: string
        display_name:
          type: string
        status:
          type: string
        connection_mode:
          type: string
    CreateMarketplaceAccountRequest:
      type: object
      required:
        - account_id
        - channel_code
        - display_name
        - connection_mode
      properties:
        account_id:
          type: string
        channel_code:
          type: string
        display_name:
          type: string
        connection_mode:
          type: string
    MarketplacePolicy:
      type: object
      required:
        - policy_id
        - tenant_id
        - account_id
        - commission_percent
        - fixed_fee_amount
        - default_shipping
        - tax_percent
        - min_margin_percent
        - sla_question_minutes
        - sla_dispatch_hours
      properties:
        policy_id:
          type: string
        tenant_id:
          type: string
        account_id:
          type: string
        commission_percent:
          type: number
          format: double
        fixed_fee_amount:
          type: number
          format: double
        default_shipping:
          type: number
          format: double
        tax_percent:
          type: number
          format: double
          description: "Server-derived. Currently always 0."
        min_margin_percent:
          type: number
          format: double
        sla_question_minutes:
          type: integer
        sla_dispatch_hours:
          type: integer
    CreateMarketplacePolicyRequest:
      type: object
      required:
        - policy_id
        - account_id
        - commission_percent
        - fixed_fee_amount
        - default_shipping
        - min_margin_percent
        - sla_question_minutes
        - sla_dispatch_hours
      properties:
        policy_id:
          type: string
        account_id:
          type: string
        commission_percent:
          type: number
          format: double
        fixed_fee_amount:
          type: number
          format: double
        default_shipping:
          type: number
          format: double
        min_margin_percent:
          type: number
          format: double
        sla_question_minutes:
          type: integer
        sla_dispatch_hours:
          type: integer
    PricingSimulation:
      type: object
      required:
        - simulation_id
        - tenant_id
        - product_id
        - account_id
        - margin_amount
        - margin_percent
        - status
      properties:
        simulation_id:
          type: string
        tenant_id:
          type: string
        product_id:
          type: string
        account_id:
          type: string
        margin_amount:
          type: number
          format: double
        margin_percent:
          type: number
          format: double
        status:
          type: string
    RunPricingSimulationRequest:
      type: object
      required:
        - simulation_id
        - product_id
        - account_id
        - base_price_amount
        - commission_percent
        - fixed_fee_amount
        - shipping_amount
        - min_margin_percent
      properties:
        simulation_id:
          type: string
        product_id:
          type: string
        account_id:
          type: string
        base_price_amount:
          type: number
          format: double
        cost_amount:
          type: number
          format: double
          description: "Optional. If not provided, the backend resolves cost from MetalShopping catalog."
        commission_percent:
          type: number
          format: double
        fixed_fee_amount:
          type: number
          format: double
        shipping_amount:
          type: number
          format: double
        min_margin_percent:
          type: number
          format: double
    ListCatalogProductsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogProduct'
    ListTaxonomyNodesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaxonomyNode'
    ListClassificationsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Classification'
    ListMarketplaceAccountsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceAccount'
    ListMarketplacePoliciesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketplacePolicy'
    ListPricingSimulationsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PricingSimulation'
    PublishToVTEXRequest:
      type: object
      required:
        - vtex_account
        - products
      properties:
        vtex_account:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductForPublish'

    RetryVTEXBatchRequest:
      type: object
      required:
        - supplemental_products
      properties:
        supplemental_products:
          type: array
          items:
            $ref: '#/components/schemas/ProductForPublish'
        vtex_account:
          type: string
          description: Optional; ignored if present (persisted batch account is used).

    ProductForPublish:
      type: object
      required:
        - product_id
        - name
        - sku_name
        - ean
        - category
        - brand
        - base_price
      properties:
        product_id:
          type: string
        name:
          type: string
        description:
          type: string
        sku_name:
          type: string
        ean:
          type: string
        category:
          type: string
        brand:
          type: string
        cost:
          type: number
          format: double
        base_price:
          type: number
          format: double
        image_urls:
          type: array
          items:
            type: string
        specs:
          type: object
          additionalProperties:
            type: string
        stock_qty:
          type: integer
        warehouse_id:
          type: string
        trade_policy_id:
          type: string

    PublishToVTEXResponse:
      type: object
      properties:
        batch_id:
          type: string
        total_products:
          type: integer
        validated:
          type: integer
        rejected:
          type: integer
        rejections:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              error_code:
                type: string

    BatchStatusResponse:
      type: object
      properties:
        batch_id:
          type: string
        vtex_account:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        total:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        in_progress:
          type: integer
        operations:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              status:
                type: string
              current_step:
                type: string
              error_code:
                type: string
                nullable: true

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: >
                Module-specific error code following the pattern MODULE_ENTITY_REASON.
                Known codes include: CATALOG_PRODUCT_NOT_FOUND, CATALOG_ENRICHMENT_INVALID,
                CLASSIFICATIONS_ENTITY_NOT_FOUND, CLASSIFICATIONS_DUPLICATE_NAME,
                MARKETPLACES_ACCOUNT_NOT_FOUND, MARKETPLACES_POLICY_NOT_FOUND,
                MARKETPLACES_DUPLICATE_ACCOUNT, MARKETPLACES_DUPLICATE_POLICY,
                PRICING_SIMULATION_INVALID, PRICING_SIMULATION_NOT_FOUND,
                CONNECTORS_BATCH_NOT_FOUND, CONNECTORS_RETRY_MISSING_PRODUCT,
                INTERNAL_ERROR, INVALID_REQUEST, NOT_FOUND, CONFLICT.
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    ConnectorErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  type: string
                  enum:
                    - CONNECTORS_PUBLISH_MISSING_NAME
                    - CONNECTORS_PUBLISH_MISSING_SKU
                    - CONNECTORS_PUBLISH_MISSING_CATEGORY
                    - CONNECTORS_PUBLISH_MISSING_BRAND
                    - CONNECTORS_PUBLISH_MISSING_PRICE
                    - CONNECTORS_PUBLISH_MISSING_STOCK
                    - CONNECTORS_PUBLISH_ALREADY_IN_PROGRESS
                    - CONNECTORS_PUBLISH_DEPENDENCY_FAILED
                    - CONNECTORS_VTEX_VALIDATION
                    - CONNECTORS_VTEX_NOT_FOUND
                    - CONNECTORS_VTEX_TRANSIENT
                    - CONNECTORS_VTEX_AUTH
                    - CONNECTORS_EXECUTOR_INTERNAL
                    - CONNECTORS_RETRY_MISSING_PRODUCT
                    - CONNECTORS_BATCH_NOT_FOUND
