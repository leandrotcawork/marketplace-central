        - channel_code
        - display_name
        - connection_mode
      properties:
        account_id:
          type: string
        channel_code:
          type: string
        display_name:
          type: string
        connection_mode:
          type: string
        marketplace_code:
          type: string
          description: "Registered marketplace plugin code (e.g. mercado_livre, shopee, magalu)."
        credentials_json:
          type: object
          additionalProperties:
            type: string
          description: "Credential key-value pairs matching credential_schema. Write-only — not returned in list responses."
    MarketplacePolicy:
      type: object
      required:
        - policy_id
        - tenant_id
        - account_id
        - commission_percent
        - fixed_fee_amount
        - default_shipping
        - tax_percent
        - min_margin_percent
        - sla_question_minutes
        - sla_dispatch_hours
        - shipping_provider
      properties:
        policy_id:
          type: string
        tenant_id:
          type: string
        account_id:
          type: string
        marketplace_code:
          type: string
          description: "The marketplace this policy applies to."
        commission_percent:
          type: number
          format: double
        commission_override:
          type: number
          format: double
          nullable: true
          description: "Tenant-specific override. Null = standard fee schedule applies."
        fixed_fee_amount:
          type: number
          format: double
        default_shipping:
          type: number
          format: double
        tax_percent:
          type: number
          format: double
          description: "Server-derived. Currently always 0."
        min_margin_percent:
          type: number
          format: double
        sla_question_minutes:
          type: integer
        sla_dispatch_hours:
          type: integer
        shipping_provider:
          type: string
          enum: [fixed, melhor_envio, marketplace]
          default: fixed
          description: "Normalized by the backend. Blank input defaults to fixed."
    CreateMarketplacePolicyRequest:
      type: object
      required:
        - policy_id
        - account_id
        - commission_percent
        - fixed_fee_amount
        - default_shipping
        - min_margin_percent
        - sla_question_minutes
        - sla_dispatch_hours
      properties:
        policy_id:
          type: string
        account_id:
          type: string
        commission_percent:
          type: number
          format: double
        commission_override:
          type: number
          format: double
          nullable: true
          description: "When set, overrides fee_schedules lookup. Null = use standard schedule."
        fixed_fee_amount:
          type: number
          format: double
        default_shipping:
          type: number
          format: double
        min_margin_percent:
          type: number
          format: double
        sla_question_minutes:
          type: integer
        sla_dispatch_hours:
          type: integer
        shipping_provider:
          type: string
          enum: [fixed, melhor_envio, marketplace]
          default: fixed
          description: "Optional. The backend trims whitespace, lowercases the value, and defaults blank/omitted input to fixed."
    PricingSimulation:
